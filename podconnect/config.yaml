---
name: "PodConnect Speakers"
version: "0.22.2"
slug: "podconnect"
image: "ghcr.io/bixelventures/{arch}-podconnect"   # pull a prebuilt image instead of compiling on-device
description: "Turns your HomePods into Spotify Connect speakers (the audio engine for PodConnect)"
url: "https://github.com/BixelVentures/podconnect"
arch:
  - aarch64
  - amd64
init: false              # the Debian base image's s6-overlay is PID 1
startup: application
boot: manual
host_network: true       # required: Spotify Connect + AirPlay discovery (mDNS) need the LAN
host_dbus: false         # we run our own dbus + avahi inside the container
watchdog: "tcp://[HOST]:3689"   # auto-restart the add-on if OwnTone's API stops responding
ingress: true                   # serve the "pick a HomePod" panel inside the HA sidebar
ingress_port: 8099              # the manager binary listens here (also reachable directly on host:8099)
panel_icon: "mdi:speaker-multiple"
panel_title: "PodConnect Speakers"
map:
  - type: addon_config
    read_only: false
options:
  # Naming + HomePod selection live in the PANEL (Add speaker / ✎ Rename / ⚙ Settings) — the legacy
  # speaker_name/homepod_name seeds were removed (they only ever fed first-boot migration).
  bitrate: "320"             # GLOBAL DEFAULT — overridable per-room in the panel (⚙ Settings)
  network_interface: ""
  grace_minutes: 3           # GLOBAL DEFAULT (hold the HomePod this long after playback stops) — overridable per-room
  attention_token: ""        # optional shared secret for the /api/attention duck API (voice gatekeeper); empty = open on the LAN
  persistent_connect: false  # EXPERIMENT: run speakers as persistent (discovery-off) Connect devices so 3 can coexist on one account. Claim each room ONCE first, then enable. Toggle off to revert.
schema:
  bitrate: "list(96|160|320)"
  network_interface: "str?"
  grace_minutes: "int(0,120)?"
  attention_token: "str?"
  persistent_connect: "bool?"
