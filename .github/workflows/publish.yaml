name: Publish add-on image

# Builds the add-on image and publishes per-arch images to GHCR, so installing on the HA
# Green PULLS a ready image instead of compiling on-device.
#
# IMPORTANT: aarch64 is built on a NATIVE ARM runner with plain buildx (NOT emulation and
# NOT the home-assistant/builder action — that action only runs on amd64). Cross-building
# arm64 under QEMU produced corrupt layers ("invalid tar header") on the real device.
on:
  push:
    branches: [main]
    paths:
      - "podconnect/Dockerfile"
      - "podconnect/build.yaml"
      - "podconnect/config.yaml"
      - "podconnect/rootfs/**"
      - ".github/workflows/publish.yaml"
  workflow_dispatch:

jobs:
  publish:
    name: publish-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: ver
        run: |
          version=$(grep '^version:' podconnect/config.yaml | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ./podconnect
          file: ./podconnect/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/bixelventures/${{ matrix.arch }}-podconnect:${{ steps.ver.outputs.version }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
