name: Build add-on

# Verifies the PodConnect add-on image actually builds (compiles OwnTone from source +
# fetches the go-librespot binary) for both architectures. amd64 gives fast feedback;
# aarch64 (the HA Green target) is built under QEMU emulation.
on:
  push:
    branches: [main]
    paths:
      - "podconnect/**"
      - ".github/workflows/build.yaml"
  pull_request:
    paths:
      - "podconnect/**"
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
            platform: linux/amd64
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: ./podconnect
          file: ./podconnect/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
