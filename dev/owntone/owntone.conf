# OwnTone — single-room test config
# Full reference: https://github.com/owntone/owntone-server/blob/master/owntone.conf.in

general {
	uid = "owntone"
}

library {
	name = "PodConnect Test"
	# The shared pipe lives here; OwnTone auto-plays it when audio arrives.
	directories = { "/srv/media" }
	pipe_autostart = true
}

audio {
	# No local speaker output — we only stream to the HomePod over AirPlay 2.
	type = "disabled"
}
