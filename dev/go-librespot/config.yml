# go-librespot — single-room test config
# Full schema: https://github.com/devgianlu/go-librespot

# Name shown in the Spotify app's "Connect to a device" list.
device_name: "PodConnect Test"
device_type: speaker
bitrate: 320

# Spotify Connect (zeroconf): pair by selecting this device in the Spotify app.
# Credentials are saved (state.json) so it stays paired across restarts.
zeroconf_enabled: true
credentials:
  type: zeroconf
  zeroconf:
    persist_credentials: true

# Send raw PCM into the shared named pipe that OwnTone reads.
audio_backend: pipe
audio_output_pipe: "/srv/media/spotify.pipe"
audio_output_pipe_format: s16le

# For THIS test, leave external_volume off so the Spotify volume slider works
# out of the box (it scales the audio). The production design sets this to
# `true` and relays volume to OwnTone instead — see docs/PLAN.md.
external_volume: false

# HTTP API + websocket events (used later by the manager / Home Assistant).
server:
  enabled: true
  address: "0.0.0.0"
  port: 3678
